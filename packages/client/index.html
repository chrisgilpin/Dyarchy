<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dyarchy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; -webkit-user-select: none; user-select: none; }
    #game { display: block; width: 100vw; height: 100vh; }

    /* Crosshair */
    #crosshair {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 10;
      display: none;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255, 255, 255, 0.8);
    }
    #crosshair::before {
      width: 20px; height: 2px;
      top: -1px; left: -10px;
    }
    #crosshair::after {
      width: 2px; height: 20px;
      top: -10px; left: -1px;
    }

    /* Click to play overlay (FPS) */
    #overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.5);
      z-index: 20;
    }
    #overlay span {
      color: #fff;
      font-family: system-ui, sans-serif;
      font-size: 24px;
    }

    /* Role select screen */
    #role-select {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.7);
      z-index: 30;
      gap: 20px;
      font-family: system-ui, sans-serif;
    }
    #role-select h1 {
      color: #fff;
      font-size: 48px;
      margin-bottom: 10px;
    }
    #role-select p {
      color: #aaa;
      font-size: 16px;
      margin-bottom: 20px;
    }
    .role-buttons {
      display: flex;
      gap: 20px;
    }
    .role-btn {
      padding: 20px 40px;
      font-size: 20px;
      border: 2px solid #555;
      border-radius: 10px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      font-family: system-ui, sans-serif;
      min-width: 180px;
      text-align: center;
    }
    .role-btn:hover {
      border-color: #0f0;
      background: rgba(255,255,255,0.2);
    }
    .role-btn small {
      display: block;
      color: #aaa;
      font-size: 13px;
      margin-top: 6px;
    }

    /* Game over screen */
    #game-over {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.75);
      z-index: 40;
      gap: 24px;
      font-family: system-ui, sans-serif;
    }
    #game-over-text {
      color: #fff;
      font-size: 52px;
      font-weight: bold;
      text-shadow: 0 0 20px rgba(255,255,255,0.3);
    }
    #btn-play-again {
      padding: 16px 48px;
      font-size: 22px;
      border: 2px solid #0f0;
      border-radius: 10px;
      background: rgba(0,255,0,0.15);
      color: #fff;
      cursor: pointer;
      font-family: system-ui, sans-serif;
      transition: background 0.2s;
    }
    #btn-play-again:hover {
      background: rgba(0,255,0,0.3);
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="crosshair"></div>
  <div id="overlay"><span>Click to play</span></div>
  <button id="btn-mute" style="position:fixed;bottom:12px;right:12px;z-index:50;background:rgba(0,0,0,0.6);color:#fff;border:1px solid #555;border-radius:6px;padding:6px 12px;cursor:pointer;font-family:system-ui,sans-serif;font-size:13px;">Sound: ON [M]</button>
  <button id="btn-controller-config" style="position:fixed;bottom:12px;right:140px;z-index:1001;background:rgba(0,0,0,0.6);color:#fff;border:1px solid #555;border-radius:6px;padding:6px 12px;cursor:pointer;font-family:system-ui,sans-serif;font-size:13px;">Controller</button>

  <div id="main-menu" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:transparent;z-index:35;gap:0;font-family:system-ui,sans-serif;">
    <div style="background:rgba(10,10,20,0.88);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:32px 40px;backdrop-filter:blur(8px);text-align:center;">
      <h1 style="color:#fff;font-size:56px;margin:0 0 4px;">DYARCHY</h1>
      <p style="color:#999;font-size:14px;margin:0 0 24px;font-style:italic;">a goodhouse games production</p>

      <!-- Player Name -->
      <div style="margin-bottom:20px;text-align:center;">
        <label style="color:#aaa;font-size:12px;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px;">Player Name</label>
        <input id="player-name" type="text" maxlength="16"
          style="padding:10px 16px;font-size:16px;border:2px solid #555;border-radius:8px;background:rgba(255,255,255,0.1);color:#fff;width:200px;text-align:center;font-family:system-ui,sans-serif;"
          placeholder="Enter your name" />
      </div>



      <!-- Multiplayer -->
      <div style="border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:16px 24px;text-align:center;min-width:320px;">
        <div style="color:#888;font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;">Multiplayer</div>

        <!-- Host options -->
        <div style="margin-bottom:8px;">
          <input id="room-name" type="text" maxlength="30" placeholder="Room name"
            style="padding:8px 12px;font-size:14px;border:2px solid #555;border-radius:8px;background:rgba(255,255,255,0.1);color:#fff;width:100%;box-sizing:border-box;font-family:system-ui,sans-serif;margin-bottom:6px;" />
          <div style="display:flex;gap:8px;justify-content:center;margin-bottom:6px;">
            <button id="vis-public" style="padding:6px 16px;border:2px solid #4a8;border-radius:6px;background:rgba(60,140,80,0.3);color:#4a8;cursor:pointer;font-size:13px;font-family:system-ui,sans-serif;">Public</button>
            <button id="vis-private" style="padding:6px 16px;border:2px solid #555;border-radius:6px;background:transparent;color:#888;cursor:pointer;font-size:13px;font-family:system-ui,sans-serif;">Private</button>
          </div>
        </div>
        <button id="btn-host" class="role-btn" style="width:100%;margin-bottom:10px;">Host Game<small>Create a new room</small></button>

        <!-- Browse -->
        <button id="btn-browse" class="role-btn" style="width:100%;margin-bottom:10px;background:rgba(80,100,140,0.2);border-color:#68a;">Browse Games<small>Find a public match</small></button>

        <!-- Join by code -->
        <div style="display:flex;gap:10px;align-items:center;">
          <input id="room-code" type="text" placeholder="Room code" maxlength="8"
            style="padding:10px 16px;font-size:16px;border:2px solid #555;border-radius:8px;background:rgba(255,255,255,0.1);color:#fff;width:160px;text-align:center;text-transform:uppercase;font-family:system-ui,sans-serif;flex:1;" />
          <button id="btn-join" class="role-btn" style="min-width:100px;">Join<small>Enter code</small></button>
        </div>
      </div>

      <div id="connection-status" style="color:#666;font-size:13px;margin-top:12px;"></div>
    </div>
  </div>

  <div id="lobby" style="position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:transparent;z-index:34;font-family:system-ui,sans-serif;">
  <div style="background:rgba(10,10,20,0.88);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:28px 36px;backdrop-filter:blur(8px);text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px;">
    <h2 style="color:#fff;font-size:32px;">Lobby</h2>
    <div id="lobby-code" style="color:#0f0;font-size:24px;font-weight:bold;"></div>
    <p style="color:#888;font-size:13px;">Share this code with friends to join</p>

    <!-- Editable name in lobby -->
    <div style="margin:4px 0 8px;text-align:center;">
      <label style="color:#aaa;font-size:11px;text-transform:uppercase;letter-spacing:1px;">Your Name</label>
      <input id="lobby-name" type="text" maxlength="16"
        style="display:block;margin:4px auto 0;padding:6px 12px;font-size:14px;border:1px solid #555;border-radius:6px;background:rgba(255,255,255,0.1);color:#fff;width:160px;text-align:center;font-family:system-ui,sans-serif;" />
    </div>

    <!-- Map selection -->
    <div style="margin:4px 0;">
      <label style="color:#aaa;font-size:11px;text-transform:uppercase;letter-spacing:1px;">Map</label>
      <div style="display:flex;gap:12px;margin-top:6px;">
        <button class="map-card" data-map="meadow" style="flex:1;padding:10px 14px;background:rgba(60,120,60,0.2);color:#fff;border:2px solid #4a8;border-radius:8px;cursor:pointer;text-align:center;font-family:system-ui,sans-serif;">
          <div style="font-size:15px;font-weight:bold;">Meadow</div>
          <div style="font-size:11px;color:#888;margin-top:2px;">240x150 — Rolling green hills</div>
        </button>
        <button class="map-card" data-map="frostpeak" style="flex:1;padding:10px 14px;background:rgba(80,100,140,0.2);color:#fff;border:2px solid #334;border-radius:8px;cursor:pointer;text-align:center;font-family:system-ui,sans-serif;">
          <div style="font-size:15px;font-weight:bold;">Frostpeak</div>
          <div style="font-size:11px;color:#888;margin-top:2px;">360x225 — Snowy mountain peaks</div>
        </button>
        <button class="map-card" data-map="blood_canyon" style="flex:1;padding:10px 14px;background:rgba(160,100,40,0.2);color:#fff;border:2px solid #334;border-radius:8px;cursor:pointer;text-align:center;font-family:system-ui,sans-serif;">
          <div style="font-size:15px;font-weight:bold;">Blood Canyon</div>
          <div style="font-size:11px;color:#888;margin-top:2px;">450x150 — Desert canyon with high walls</div>
        </button>
        <button class="map-card" data-map="ironhold" style="flex:1;padding:10px 14px;background:rgba(60,40,30,0.2);color:#fff;border:2px solid #334;border-radius:8px;cursor:pointer;text-align:center;font-family:system-ui,sans-serif;">
          <div style="font-size:15px;font-weight:bold;">Ironhold Caverns</div>
          <div style="font-size:11px;color:#888;margin-top:2px;">300x180 — Volcanic ridges + tunnels</div>
        </button>
      </div>
    </div>

    <!-- Team/Role selection grid -->
    <div style="display:flex;gap:24px;margin:12px 0;">
      <!-- Blue Team -->
      <div style="border:2px solid #2255bb;border-radius:10px;padding:16px;min-width:180px;text-align:center;">
        <div style="color:#4488dd;font-size:18px;font-weight:bold;margin-bottom:12px;">Blue Team</div>
        <button class="lobby-slot" data-team="1" data-role="fps" style="display:block;width:100%;padding:10px;margin-bottom:2px;background:rgba(34,85,187,0.15);color:#fff;border:2px solid #334;border-radius:6px;cursor:pointer;font-size:14px;font-family:system-ui,sans-serif;">
          FPS <span style="color:#888;font-size:12px;">— Shooter</span>
          <div class="slot-player" style="color:#4488dd;font-size:12px;margin-top:4px;"></div>
        </button>
        <button class="cpu-toggle" data-team="1" data-role="fps" style="display:none;width:100%;padding:3px;margin-bottom:8px;background:transparent;color:#666;border:1px solid #333;border-radius:4px;cursor:pointer;font-size:11px;font-family:system-ui,sans-serif;">CPU: Off</button>
        <button class="lobby-slot" data-team="1" data-role="rts" style="display:block;width:100%;padding:10px;margin-bottom:2px;background:rgba(34,85,187,0.15);color:#fff;border:2px solid #334;border-radius:6px;cursor:pointer;font-size:14px;font-family:system-ui,sans-serif;">
          RTS <span style="color:#888;font-size:12px;">— Strategy</span>
          <div class="slot-player" style="color:#4488dd;font-size:12px;margin-top:4px;"></div>
        </button>
        <button class="cpu-toggle" data-team="1" data-role="rts" style="display:none;width:100%;padding:3px;background:transparent;color:#666;border:1px solid #333;border-radius:4px;cursor:pointer;font-size:11px;font-family:system-ui,sans-serif;">CPU: Off</button>
      </div>
      <!-- Red Team -->
      <div style="border:2px solid #bb2222;border-radius:10px;padding:16px;min-width:180px;text-align:center;">
        <div style="color:#dd4444;font-size:18px;font-weight:bold;margin-bottom:12px;">Red Team</div>
        <button class="lobby-slot" data-team="2" data-role="fps" style="display:block;width:100%;padding:10px;margin-bottom:2px;background:rgba(187,34,34,0.15);color:#fff;border:2px solid #334;border-radius:6px;cursor:pointer;font-size:14px;font-family:system-ui,sans-serif;">
          FPS <span style="color:#888;font-size:12px;">— Shooter</span>
          <div class="slot-player" style="color:#dd4444;font-size:12px;margin-top:4px;"></div>
        </button>
        <button class="cpu-toggle" data-team="2" data-role="fps" style="display:none;width:100%;padding:3px;margin-bottom:8px;background:transparent;color:#666;border:1px solid #333;border-radius:4px;cursor:pointer;font-size:11px;font-family:system-ui,sans-serif;">CPU: Off</button>
        <button class="lobby-slot" data-team="2" data-role="rts" style="display:block;width:100%;padding:10px;margin-bottom:2px;background:rgba(187,34,34,0.15);color:#fff;border:2px solid #334;border-radius:6px;cursor:pointer;font-size:14px;font-family:system-ui,sans-serif;">
          RTS <span style="color:#888;font-size:12px;">— Strategy</span>
          <div class="slot-player" style="color:#dd4444;font-size:12px;margin-top:4px;"></div>
        </button>
        <button class="cpu-toggle" data-team="2" data-role="rts" style="display:none;width:100%;padding:3px;background:transparent;color:#666;border:1px solid #333;border-radius:4px;cursor:pointer;font-size:11px;font-family:system-ui,sans-serif;">CPU: Off</button>
      </div>
    </div>

    <button id="btn-ready" class="role-btn" style="min-width:200px;border-color:#0f0;">Ready</button>
    <div id="lobby-status" style="color:#888;font-size:13px;"></div>
  </div>
  </div>

  <!-- Browse Lobby Screen -->
  <div id="browse-lobby" style="position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:transparent;z-index:35;gap:16px;font-family:system-ui,sans-serif;">
    <div style="background:rgba(10,10,20,0.92);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:24px 32px;backdrop-filter:blur(8px);width:480px;max-height:80vh;display:flex;flex-direction:column;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h2 style="color:#fff;font-size:24px;margin:0;">Public Games</h2>
        <button id="btn-browse-back" style="padding:6px 14px;background:rgba(255,255,255,0.1);color:#aaa;border:1px solid #555;border-radius:6px;cursor:pointer;font-size:13px;font-family:system-ui,sans-serif;">Back</button>
      </div>
      <div id="lobby-room-list" style="flex:1;overflow-y:auto;min-height:200px;max-height:400px;">
        <div id="lobby-empty" style="color:#666;font-size:14px;text-align:center;padding:40px 0;">No public games available</div>
      </div>
    </div>
  </div>

  <!-- Swap request dialog (shown during game) -->
  <div id="swap-dialog" style="position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);z-index:45;font-family:system-ui,sans-serif;">
    <div style="background:rgba(20,20,30,0.95);border:2px solid #ff0;border-radius:12px;padding:24px 32px;text-align:center;max-width:360px;">
      <div id="swap-dialog-text" style="color:#fff;font-size:18px;margin-bottom:16px;"></div>
      <div style="display:flex;gap:12px;justify-content:center;">
        <button id="btn-swap-yes" style="padding:10px 24px;background:rgba(0,255,0,0.2);color:#0f0;border:2px solid #0f0;border-radius:6px;cursor:pointer;font-size:16px;font-family:system-ui,sans-serif;">Yes, swap</button>
        <button id="btn-swap-no" style="padding:10px 24px;background:rgba(255,0,0,0.2);color:#f44;border:2px solid #f44;border-radius:6px;cursor:pointer;font-size:16px;font-family:system-ui,sans-serif;">No thanks</button>
      </div>
    </div>
  </div>

  <div id="role-select" style="display:none;">
    <h1>DYARCHY</h1>
    <p>Choose your role (press Tab in-game to switch)</p>
    <div class="role-buttons">
      <button id="btn-fps" class="role-btn">
        FPS
        <small>First-person shooter</small>
      </button>
      <button id="btn-rts" class="role-btn">
        RTS
        <small>Real-time strategy</small>
      </button>
    </div>
  </div>

  <div id="game-over">
    <div id="game-over-text">Victory!</div>
    <button id="btn-play-again">Play Again</button>
  </div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
